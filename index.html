<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- App Meta -->
    <title>Lincc - Everything Local</title>
    <meta name="description" content="Everything happening around you, in one place" />
    <meta name="theme-color" content="#845EF7" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://srrubyupwiiqnehshszd.supabase.co" />
    <link rel="dns-prefetch" href="https://api.mapbox.com" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lincc" />

  <body>
    <div id="root">
      <!-- Inline shell for instant FCP while React boots -->
      <div style="min-height:100vh;background:#FAFAFA;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#FF6B6B,#845EF7);animation:pulse 1.5s ease-in-out infinite"></div>
      </div>
      <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
